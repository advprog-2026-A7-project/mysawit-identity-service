# ============================================================
# Local monitoring stack: Prometheus + Grafana
# ============================================================
# Run with:   docker compose -f docker-compose.monitoring.yml up -d
# Stop with:  docker compose -f docker-compose.monitoring.yml down
#
# This file is deliberately separate from any future app compose
# file so you can spin monitoring up/down without touching the
# Spring Boot service.
# ------------------------------------------------------------

services:
  # ----------------------------------------------------------
  # Prometheus — scrapes /actuator/prometheus and stores series
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1     # pinned tag = reproducible
    container_name: mysawit-prometheus
    restart: unless-stopped
    ports:
      # host:container — open http://localhost:9090 in your browser
      - "9090:9090"
    volumes:
      # Mount the config file we wrote earlier (read-only).
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Named volume so scraped data survives container restarts.
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      # 7 days of retention is plenty for local experimentation.
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'        # allows POST /-/reload to hot-reload config
    extra_hosts:
      # Required on Linux so `host.docker.internal` (used in
      # prometheus.yml) resolves to the host machine. On
      # Docker Desktop (Win/Mac) this is automatic, but adding it
      # here makes the setup portable.
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring

  # ----------------------------------------------------------
  # Grafana — dashboards & visualisation
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:11.3.0
    container_name: mysawit-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"                     # http://localhost:3000
    environment:
      # Default admin credentials. Change for anything non-local.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Skip the "change your password" wizard for local dev.
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      # Provisioning = config-as-code: data source + dashboard loader
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      # Folder Grafana watches for dashboard JSON files
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Named volume so users/dashboards survive restarts
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring

volumes:
  prometheus-data:
  grafana-data:

networks:
  monitoring:
    driver: bridge
