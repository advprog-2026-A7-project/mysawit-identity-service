# H2 in-memory database for integration tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=never

# JWT Configuration
jwt.secret=integration-test-secret-key-must-be-at-least-64-characters-long-for-hmac
jwt.expiration=86400000
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# Google Login Configuration
google.client-id=test-google-client-id

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# Internal API Configuration
internal.api-key=test-internal-api-key

# Admin Utama Configuration
admin.utama.email=admin@mysawit.com

# RabbitMQ Configuration (disabled for tests)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
