openapi: 3.0.3
info:
  title: MySawit Identity Service API
  version: 1.0.0
  description: >
    Identity Service responsible for user authentication, JWT issuance,
    account linking, user administration, internal user lookup, and
    role-protected identity-domain access checks.

servers:
  - url: http://localhost:8081
    description: Local Identity Service
  - url: https://api.mysawit.example.com
    description: Public ALB base URL

tags:
  - name: Authentication
  - name: Account Linking
  - name: Administration
  - name: Internal Users
  - name: Domain Access
  - name: Health

paths:

  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: User successfully registered and tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "409":
          $ref: '#/components/responses/Conflict'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate user and obtain tokens
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/auth/google:
    post:
      tags: [Authentication]
      summary: Google OAuth login or registration
      operationId: googleLogin
      security: []
      description: >
        Handles both login and registration via Google OAuth. If the Google
        subject already exists, that user is logged in. If the email exists
        without a linked Google subject, the account is linked and logged in.
        For a first-time Google registration, role and username are required.
        ADMIN self-registration is rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLoginRequest'
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "409":
          $ref: '#/components/responses/Conflict'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/auth/validate:
    post:
      tags: [Authentication]
      summary: Validate JWT token
      operationId: validateToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateTokenRequest'
      responses:
        "200":
          description: Token validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateTokenResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/auth/refresh:
    post:
      tags: [Authentication]
      summary: Rotate refresh token and issue new tokens
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        "200":
          description: Token refresh successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/auth/logout:
    post:
      tags: [Authentication]
      summary: Revoke a refresh token
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Logged out successfully
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/auth/link-google:
    post:
      tags: [Account Linking]
      summary: Link a Google account to the authenticated user
      operationId: linkGoogleAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkGoogleRequest'
      responses:
        "200":
          description: Google account linked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Google account linked successfully
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/auth/set-password:
    post:
      tags: [Account Linking]
      summary: Set or replace the authenticated user's local password
      operationId: setPassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
      responses:
        "200":
          description: Password set successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Password set successfully
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/auth/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: authHealth
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/admin/users:
    get:
      tags: [Administration]
      summary: List users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Optional case-insensitive name filter.
        - name: email
          in: query
          required: false
          schema:
            type: string
          description: Optional case-insensitive email filter.
        - name: role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Role'
      responses:
        "200":
          description: Users matching the filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDetailResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/admin/users/{userId}:
    get:
      tags: [Administration]
      summary: Get user detail
      operationId: getUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetailResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'

    delete:
      tags: [Administration]
      summary: Delete a user
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        "200":
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: User deleted successfully
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/admin/users/{buruhId}/assign-mandor:
    put:
      tags: [Administration]
      summary: Assign a BURUH user to a MANDOR
      operationId: assignBuruhToMandor
      security:
        - bearerAuth: []
      parameters:
        - name: buruhId
          in: path
          required: true
          schema:
            type: string
            maxLength: 36
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignBuruhRequest'
      responses:
        "200":
          description: Buruh assigned to Mandor successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Buruh assigned to Mandor successfully
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/admin/users/{buruhId}/unassign-mandor:
    put:
      tags: [Administration]
      summary: Remove a BURUH user's MANDOR assignment
      operationId: unassignBuruhFromMandor
      security:
        - bearerAuth: []
      parameters:
        - name: buruhId
          in: path
          required: true
          schema:
            type: string
            maxLength: 36
      responses:
        "200":
          description: Buruh unassigned from Mandor successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Buruh unassigned from Mandor successfully
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/internal/users/{userId}:
    get:
      tags: [Internal Users]
      summary: Get user detail for trusted internal services
      operationId: getInternalUserById
      security:
        - internalApiKey: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        "200":
          description: Internal user detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalUserDetailResponse'
        "401":
          description: Missing or invalid internal API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalApiKeyErrorResponse'
              example:
                message: Missing or invalid API key
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/harvest:
    get:
      tags: [Domain Access]
      summary: Check harvest access
      operationId: checkHarvestAccess
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Harvest access granted for MANDOR or ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainAccessResponse'
              example:
                resource: harvest
                access: harvest-access-granted
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/delivery:
    get:
      tags: [Domain Access]
      summary: Check delivery access
      operationId: checkDeliveryAccess
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Delivery access granted for SUPIR or ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainAccessResponse'
              example:
                resource: delivery
                access: delivery-access-granted
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "500":
          $ref: '#/components/responses/ServerError'

  /api/payroll:
    get:
      tags: [Domain Access]
      summary: Check payroll access
      operationId: checkPayrollAccess
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Payroll access granted for ADMIN
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainAccessResponse'
              example:
                resource: payroll
                access: payroll-access-granted
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "500":
          $ref: '#/components/responses/ServerError'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalApiKey:
      type: apiKey
      in: header
      name: X-Internal-Api-Key

  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        maxLength: 36

  responses:
    BadRequest:
      description: Invalid input or business validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, invalid, or expired credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user is not allowed to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict, such as duplicate email, certification number, or Google link
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Login rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            timestamp: "2026-05-02T12:00:00+07:00"
            status: 429
            error: Too Many Requests
            message: Too many login attempts. Please try again later.
            path: /api/auth/login
    ServerError:
      description: Server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    Role:
      type: string
      enum: [BURUH, MANDOR, SUPIR, ADMIN]

    PublicRegistrationRole:
      type: string
      enum: [BURUH, MANDOR, SUPIR]
      description: ADMIN is rejected for public self-registration.

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          allOf:
            - $ref: '#/components/schemas/PublicRegistrationRole'
          description: Optional. Defaults to BURUH when omitted.
        certificationNumber:
          type: string
          maxLength: 50
          description: Required when role is MANDOR.
        mandorId:
          type: string
          maxLength: 36
          description: Optional when role is BURUH. When present, it must reference an existing MANDOR.
        kebunId:
          type: string
          maxLength: 36
          description: Optional when role is SUPIR.
      required:
        - username
        - email
        - password

    GoogleLoginRequest:
      type: object
      properties:
        idToken:
          type: string
          description: Google OAuth2 ID token.
        username:
          type: string
          description: Required for first-time Google registration. Ignored for existing users.
        role:
          allOf:
            - $ref: '#/components/schemas/PublicRegistrationRole'
          description: Required for first-time Google registration. Ignored for existing users.
        certificationNumber:
          type: string
          maxLength: 50
          description: Required when role is MANDOR during first-time Google registration.
      required:
        - idToken

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email for login. Backward-compatible alias `username` is accepted temporarily.
        username:
          type: string
          format: email
          deprecated: true
          description: Deprecated alias for `email`.
        password:
          type: string
      required:
        - password
      anyOf:
        - required: [email]
        - required: [username]

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken

    LinkGoogleRequest:
      type: object
      properties:
        idToken:
          type: string
          description: Google OAuth2 ID token.
      required:
        - idToken

    SetPasswordRequest:
      type: object
      properties:
        password:
          type: string
          minLength: 6
      required:
        - password

    ValidateTokenRequest:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    ValidateTokenResponse:
      type: object
      properties:
        valid:
          type: boolean
        username:
          type: string
          description: Subject extracted from the JWT.
      required:
        - valid
        - username

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token.
        refreshToken:
          type: string
          description: Refresh token.
        type:
          type: string
          example: Bearer
        id:
          type: string
        username:
          type: string
          description: User display name returned by the service.
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        googleLinked:
          type: boolean
          description: True when a Google account is linked.
        hasPassword:
          type: boolean
          description: True when local password login is enabled.
      required:
        - token
        - refreshToken
        - type
        - id
        - username
        - email
        - role
        - googleLinked
        - hasPassword

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    UserDetailResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        createdAt:
          type: string
          format: date-time
        mandorId:
          type: string
          nullable: true
          description: Present for BURUH users assigned to a MANDOR.
        certificationNumber:
          type: string
          nullable: true
          description: Present for MANDOR users.
        kebunId:
          type: string
          nullable: true
          description: Present for SUPIR users when set.
        googleLinked:
          type: boolean
        hasPassword:
          type: boolean
      required:
        - id
        - username
        - email
        - name
        - role
        - createdAt
        - googleLinked
        - hasPassword

    InternalUserDetailResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        mandorId:
          type: string
          nullable: true
          description: Present for BURUH users assigned to a MANDOR.
        mandorName:
          type: string
          nullable: true
          description: Present for BURUH users assigned to a MANDOR.
        certificationNumber:
          type: string
          nullable: true
          description: Present for MANDOR users.
        kebunId:
          type: string
          nullable: true
          description: Present for SUPIR users when set.
      required:
        - id
        - name
        - email
        - role

    AssignBuruhRequest:
      type: object
      properties:
        mandorId:
          type: string
          maxLength: 36
      required:
        - mandorId

    DomainAccessResponse:
      type: object
      properties:
        resource:
          type: string
          enum: [harvest, delivery, payroll]
        access:
          type: string
      required:
        - resource
        - access

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
      required:
        - timestamp
        - status
        - error
        - message
        - path

    InternalApiKeyErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
        service:
          type: string
          example: mysawit-identity-service
      required:
        - status
        - service
