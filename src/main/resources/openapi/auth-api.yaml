openapi: 3.0.3
info:
  title: MySawit Identity Service API
  version: 1.0.0
  description: >
    Identity Service responsible for user authentication and JWT issuance.

servers:
  - url: http://localhost:8081
    description: Local Identity Service
  - url: https://api.mysawit.example.com
    description: Public ALB base URL

tags:
  - name: Authentication
  - name: Health

paths:

  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: User successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "400":
          description: Invalid input or business validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "409":
          description: Conflict (duplicate email/certification number)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate user and obtain JWT
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/validate:
    post:
      tags: [Authentication]
      summary: Validate JWT token
      operationId: validateToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateTokenRequest'
      responses:
        "200":
          description: Token validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateTokenResponse'
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/health:
    get:
      tags: [Health]
      summary: Health check
      operationId: authHealth
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'


components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [BURUH, MANDOR, SUPIR, ADMIN]
          description: Optional. Defaults to BURUH when omitted.
        certificationNumber:
          type: string
          maxLength: 50
          description: Required when role is MANDOR.
        mandorId:
          type: string
          maxLength: 36
          description: Optional when role is BURUH.
        kebunId:
          type: string
          maxLength: 36
          description: Optional when role is SUPIR.
      required:
        - username
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email for login. Backward compatible alias `username` is accepted temporarily.
        password:
          type: string
      required:
        - email
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
        refreshToken:
          type: string
          description: Refresh token
        type:
          type: string
          example: Bearer
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          example: BURUH
        googleLinked:
          type: boolean
          description: True when a Google account is linked.
        hasPassword:
          type: boolean
          description: True when local password login is enabled.
      required:
        - token
        - refreshToken
        - type
        - id
        - username
        - email
        - role
        - googleLinked
        - hasPassword

    ValidateTokenRequest:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    ValidateTokenResponse:
      type: object
      properties:
        valid:
          type: boolean
        username:
          type: string
      required:
        - valid
        - username

    UserResponse:
      type: object
      properties:
        id:
          type: string
        token:
          type: string
        refreshToken:
          type: string
        type:
          type: string
          example: Bearer
        username:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          example: BURUH
        googleLinked:
          type: boolean
        hasPassword:
          type: boolean
      required:
        - id
        - token
        - refreshToken
        - type
        - username
        - email
        - role
        - googleLinked
        - hasPassword

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
      required:
        - timestamp
        - status
        - error
        - message
        - path

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
        service:
          type: string
          example: mysawit-identity-service
      required:
        - status
        - service
