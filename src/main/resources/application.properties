spring.application.name=mysawit-identity-service
server.port=8081

# --- Supabase Database Configuration ---
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.luymlqdyfvvrmnepsgsj
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:mysawit-secret-key-change-in-production-2026}
jwt.expiration=86400000

# Google Login Configuration
google.client-id=${GOOGLE_CLIENT_ID:}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
