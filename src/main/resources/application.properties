spring.application.name=mysawit-identity-service
server.port=8081

# --- Supabase Database Configuration ---
spring.datasource.url=jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.lxbjqsyyhzoyplveimbg
spring.datasource.password=${DB_PASSWORD:}

# Hikari pool tuned for Supabase pooler (closes idle connections aggressively)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:mysawit-secret-key-change-in-production-2026}
jwt.expiration=86400000
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# Google Login Configuration
google.client-id=${GOOGLE_CLIENT_ID:}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Internal API Configuration
internal.api-key=${INTERNAL_API_KEY:}

# Admin Utama Configuration
admin.utama.email=${ADMIN_UTAMA_EMAIL:admin@mysawit.com}

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized

# Tag every metric with the service name so Prometheus/Grafana can filter by it.
# Useful later if you add more microservices to the same Prometheus instance.
management.metrics.tags.application=${spring.application.name}

# Enable %-based histograms for HTTP server requests so you can compute
# p95/p99 latency in Prometheus/Grafana with histogram_quantile().
management.metrics.distribution.percentiles-histogram.http.server.requests=true
