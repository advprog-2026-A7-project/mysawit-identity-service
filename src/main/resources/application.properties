spring.application.name=mysawit-identity-service
server.port=${SERVER_PORT:8081}
server.address=0.0.0.0

# --- Supabase Database Configuration ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.lxbjqsyyhzoyplveimbg}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

# Hikari pool tuned for Supabase pooler (closes idle connections aggressively)
# Baseline (pool=5, idle=0) gave P95 ~2.75s @ 50 concurrent — pool exhaustion
# was the dominant bottleneck. Bumped to 15 + warm 5 idle connections.
# Caveat: Supabase pooler has its own client connection limit — confirm in
# Supabase Dashboard before scaling pool size further.
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=3000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.com.zaxxer.hikari=INFO

# JWT Configuration
jwt.secret=${JWT_SECRET:mysawit-secret-key-change-in-production-2026}
jwt.expiration=86400000
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# Google Login Configuration
google.client-id=${GOOGLE_CLIENT_ID:}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Internal API Configuration
internal.api-key=${INTERNAL_API_KEY:}

# Admin Utama Configuration
admin.utama.email=${ADMIN_UTAMA_EMAIL:admin@mysawit.com}

# RabbitMQ / CloudAMQP Configuration
# In prod, set CLOUDAMQP_URL to the AMQPS URL from CloudAMQP.
# Locally, falls back to host/port/user/pass for a docker-compose RabbitMQ.
spring.rabbitmq.addresses=${CLOUDAMQP_URL:amqp://${RABBITMQ_USER:guest}:${RABBITMQ_PASS:guest}@${RABBITMQ_HOST:localhost}:${RABBITMQ_PORT:5672}/}
# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:xlmhivki}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL_ENABLED:true}
# RabbitMQ / CloudAMQP Configuration
# In prod, set CLOUDAMQP_URL to the AMQPS URL from CloudAMQP.
# Locally, falls back to host/port/user/pass for a docker-compose RabbitMQ.
spring.rabbitmq.addresses=${CLOUDAMQP_URL:amqp://${RABBITMQ_USER:guest}:${RABBITMQ_PASS:guest}@${RABBITMQ_HOST:localhost}:${RABBITMQ_PORT:5672}/}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.group.readiness.include=readinessState,db

# Tag every metric with the service name so Prometheus/Grafana can filter by it.
# Useful later if you add more microservices to the same Prometheus instance.
management.metrics.tags.application=${spring.application.name}

# Enable %-based histograms for HTTP server requests so you can compute
# p95/p99 latency in Prometheus/Grafana with histogram_quantile().
management.metrics.distribution.percentiles-histogram.http.server.requests=true
